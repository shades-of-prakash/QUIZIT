services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app1
    ports:
      - "4001:4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://host.docker.internal:27017/QUIZIT
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
    networks:
      - app-network

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app2
    ports:
      - "4002:4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://host.docker.internal:27017/QUIZIT
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
    networks:
      - app-network

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app3
    ports:
      - "4003:4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://host.docker.internal:27017/QUIZIT
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
